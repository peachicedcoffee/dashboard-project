<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <title>사칙연산 계산기</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <script src="view.js"></script>
    <script src="app.js"></script>
</head>

<body>
    <h1>🧮사칙연산 계산기</h1>
    <input type="text" id="number1" placeholder="숫자1" />
    
    <select id="operator">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">x</option>
        <option value="/">÷</option>
    </select>

    <input type="text" id="number2" placeholder="숫자2" />
    <button id="calculateBtn">=</button>
    <p id="result">결과: </p>
</body>
</html>
